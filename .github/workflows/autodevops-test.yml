name: AutoDevOps Test Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 推論されたPythonプロジェクトのため、一般的なバージョンを指定

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Last/requirements.txt が存在する場合、依存関係をインストール
          if [ -f Last/requirements.txt ]; then
            pip install -r Last/requirements.txt
          else
            echo "Last/requirements.txt が見つかりませんでした。Last/ プロジェクトの依存関係インストールをスキップします。"
          fi
          # 他のプロジェクト（例: lecture-4/calcurator, lecture-4/hello-world）の pyproject.toml に基づく依存関係インストールは、
          # 明示的なテストファイルやテストコマンドが指定されていないため、今回はスキップします。
          # 必要であれば、各ディレクトリに移動して poetry install などを追加できます。

      - name: Run tests
        run: |
          # Last/test.py が存在する場合、テストを実行
          if [ -f Last/test.py ]; then
            echo "Last/test.py を実行します。"
            python Last/test.py
          else
            echo "Last/test.py が見つかりませんでした。テスト実行をスキップします。"
            # もし pytest などを使用している場合は、以下のように追加できます。
            # pip install pytest
            # pytest Last/
          fi

      - name: Notify AutoDevOps on failure
        if: failure()
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "$BRANCH" == fix/agent-* ]] || echo "$COMMIT_MSG" | grep -qE "\[Auto-Fix\]|fix: AutoDevOps Agent|docs: Add incident|fix: Self-Healing Agent"; then
            echo "Skipping AutoDevOps notification for auto-fix branch or commit."
            exit 0
          fi
          curl -s -X POST -H "Content-Type: application/json" \
          -d "{\"workflow_run\": {\"name\": \"${{ github.workflow }}\", \"head_branch\": \"$BRANCH\", \"updated_at\": \"${{ github.event.head_commit.timestamp }}\"}, \"repository\": {\"full_name\": \"${{ github.repository }}\"}, \"action\": \"completed\", \"conclusion\": \"failure\"}" \
          "https://autodevops-merge-worker-617819190113.asia-northeast1.run.app/webhook/github_actions?user_id=mseGHtj9GAQ8cDIk9UvirQfFpQt1"