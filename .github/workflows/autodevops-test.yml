name: AutoDevOps Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Adjust Python version as needed

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f Last/requirements.txt ]; then
            pip install -r Last/requirements.txt
          fi
          # Install pytest for running tests, if not already in requirements.txt
          pip install pytest

      - name: Run tests
        # Assuming Last/test.py contains pytest-compatible tests.
        # If it uses unittest, you might need to adjust this to `python -m unittest Last.test`
        # or `python Last/test.py` if it's a self-executing test script.
        run: |
          if [ -f Last/test.py ]; then
            pytest Last/test.py
          else
            echo "No Last/test.py found. Skipping tests for 'Last' directory."
            exit 0
          fi

      - name: Notify AutoDevOps on failure
        if: failure()
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "$BRANCH" == fix/agent-* ]] || echo "$COMMIT_MSG" | grep -qE "\[Auto-Fix\]|fix: AutoDevOps Agent|docs: Add incident|fix: Self-Healing Agent"; then
            echo "Skipping AutoDevOps notification for auto-fix branch or commit."
            exit 0
          fi
          curl -s -X POST -H "Content-Type: application/json" \
          -d "{\"workflow_run\": {\"name\": \"${{ github.workflow }}\", \"head_branch\": \"$BRANCH\", \"updated_at\": \"${{ github.event.head_commit.timestamp }}\"}, \"repository\": {\"full_name\": \"${{ github.repository }}\"}, \"action\": \"completed\", \"conclusion\": \"failure\"}" \
          "https://autodevops-merge-worker-617819190113.asia-northeast1.run.app/webhook/github_actions?user_id=mseGHtj9GAQ8cDIk9UvirQfFpQt1"