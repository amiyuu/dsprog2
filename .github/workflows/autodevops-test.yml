name: AutoDevOps Test Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' # Use the latest Python 3.x version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install dependencies for the 'Last' project, as it contains 'test.py'
          if [ -f Last/requirements.txt ]; then
            pip install -r Last/requirements.txt
          fi
          # Add any other project-specific dependency installations here if needed
          # For example, if lecture-4/calcurator used poetry:
          # if [ -f lecture-4/calcurator/pyproject.toml ]; then
          #   pip install poetry
          #   cd lecture-4/calcurator
          #   poetry install --no-root
          #   cd ../../
          # fi

      - name: Run tests
        run: |
          # Execute the main test file found in 'Last/test.py'
          if [ -f Last/test.py ]; then
            python Last/test.py
          else
            echo "No 'Last/test.py' found. Skipping specific test execution."
            # Add commands to run other tests if they exist, e.g., pytest
            # For example, if using pytest and tests are in a 'tests' directory:
            # pip install pytest
            # pytest
          fi

      - name: Notify AutoDevOps on failure
        if: failure()
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "$BRANCH" == fix/agent-* ]] || echo "$COMMIT_MSG" | grep -qE "\[Auto-Fix\]|fix: AutoDevOps Agent|docs: Add incident|fix: Self-Healing Agent"; then
            echo "Skipping AutoDevOps notification for auto-fix branch or commit."
            exit 0
          fi
          curl -s -X POST -H "Content-Type: application/json" \
          -d "{\"workflow_run\": {\"name\": \"${{ github.workflow }}\", \"head_branch\": \"$BRANCH\", \"updated_at\": \"${{ github.event.head_commit.timestamp }}\"}, \"repository\": {\"full_name\": \"${{ github.repository }}\"}, \"action\": \"completed\", \"conclusion\": \"failure\"}" \
          "https://autodevops-merge-worker-617819190113.asia-northeast1.run.app/webhook/github_actions?user_id=mseGHtj9GAQ8cDIk9UvirQfFpQt1"