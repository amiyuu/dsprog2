name: AutoDevOps Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' # Use a recent stable Python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Check for requirements.txt in the 'Last' directory and install if found
          if [ -f Last/requirements.txt ]; then
            echo "Installing dependencies from Last/requirements.txt"
            pip install -r Last/requirements.txt
          else
            echo "No Last/requirements.txt found in 'Last' directory. Skipping dependency installation for this project."
          fi
          # Note: If other sub-projects (e.g., lecture-4/calcurator) have their own dependencies
          # and tests, they would require separate installation/test steps or jobs.
          # This workflow focuses on the most explicit test case: Last/test.py.

      - name: Run tests
        run: |
          # Check if Last/test.py exists and run it
          if [ -f Last/test.py ]; then
            echo "Running tests from Last/test.py"
            python Last/test.py
          else
            echo "No Last/test.py found. Skipping tests for 'Last' project."
            # Exit with success if no tests are found, as it's not a failure of the code itself.
            exit 0
          fi

      - name: Notify AutoDevOps on failure
        if: failure()
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "$BRANCH" == fix/agent-* ]] || echo "$COMMIT_MSG" | grep -qE "\[Auto-Fix\]|fix: AutoDevOps Agent|docs: Add incident|fix: Self-Healing Agent"; then
            echo "Skipping AutoDevOps notification for auto-fix branch or commit."
            exit 0
          fi
          curl -s -X POST -H "Content-Type: application/json" \
          -d "{\"workflow_run\": {\"name\": \"${{ github.workflow }}\", \"head_branch\": \"$BRANCH\", \"updated_at\": \"${{ github.event.head_commit.timestamp }}\"}, \"repository\": {\"full_name\": \"${{ github.repository }}\"}, \"action\": \"completed\", \"conclusion\": \"failure\"}" \
          "https://autodevops-merge-worker-617819190113.asia-northeast1.run.app/webhook/github_actions?user_id=mseGHtj9GAQ8cDIk9UvirQfFpQt1"